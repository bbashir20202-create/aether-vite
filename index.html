<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: monospace; padding: 20px; }
    .error { color: #ff5555; background: #2a0f0f; padding: 15px; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1 class="text-2xl mb-4">Aether Debug Mode</h1>
  <div id="chat"></div>
  
  <input type="text" id="input" placeholder="Type here and press Enter" style="width:100%;padding:15px;margin-top:20px;background:#1f1f1f;color:white;border:1px solid #555;border-radius:8px;">
  
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(text, color = 'white') {
      const div = document.createElement('div');
      div.style.color = color;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("You: " + text, '#a5b4fc');
      input.value = '';

      const loading = document.createElement('div');
      loading.textContent = "Calling Groq API...";
      loading.style.color = '#f59e0b';
      chat.appendChild(loading);

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer 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'
          },
          body: JSON.stringify({
            model: "llama3-8b-8192",
            messages: [{ role: "user", content: text }],
            temperature: 0.7,
            max_tokens: 500
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(`API Error ${res.status}: ${data.error?.message || 'Unknown error'}`);
        }

        const reply = data.choices[0].message.content;
        chat.removeChild(loading);
        addMessage("Aether: " + reply, '#67e8f9');

      } catch (err) {
        chat.removeChild(loading);
        addMessage("ERROR: " + err.message, 'red');
        console.error(err);
      }
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    addMessage("Debug mode started. Type a message and press Enter. Any API error will be shown clearly.", '#67e8f9');
  </script>
</body>
</html>
