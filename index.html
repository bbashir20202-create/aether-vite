<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether Debug</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #050505; color: #ddd; font-family: monospace; padding: 20px; }
    .chat { height: 70vh; overflow-y: auto; background: #111; padding: 15px; }
    .message { margin: 10px 0; padding: 12px; border-radius: 8px; }
    .user { background: #7c3aed; color: white; }
    .assistant { background: #1f2937; }
    .error { background: #450a0a; color: #fda4af; border: 1px solid #b91c1c; }
    input { width: 100%; padding: 15px; background: #1f1f1f; border: 1px solid #444; border-radius: 8px; color: white; margin-top: 10px; }
    button { padding: 15px 30px; background: #7c3aed; color: white; border: none; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1 class="text-2xl mb-4 text-purple-400">Aether - Debug Mode</h1>
  <div class="chat" id="chat"></div>
  
  <input type="text" id="input" placeholder="Type here and press Enter" />
  <button onclick="sendMessage()">Send</button>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(text, type = 'assistant') {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("You: " + text, 'user');
      input.value = '';

      const loading = document.createElement('div');
      loading.textContent = "Calling Groq API...";
      loading.className = "message assistant";
      chat.appendChild(loading);

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer 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'
          },
          body: JSON.stringify({
            model: "llama3-70b-8192",
            messages: [{ role: "user", content: text }],
            temperature: 0.7,
            max_tokens: 800
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(`API Error ${res.status}: ${data.error?.message || JSON.stringify(data)}`);
        }

        const reply = data.choices[0].message.content;
        chat.removeChild(loading);
        addMessage("Aether: " + reply);

      } catch (err) {
        chat.removeChild(loading);
        addMessage("ERROR: " + err.message, 'error');
        console.error(err);
      }
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    addMessage("Debug mode started. Type a message and press Enter. The exact error will be shown.", 'assistant');
  </script>
</body>
</html>
