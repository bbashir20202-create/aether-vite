<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether • Your Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #ddd; }
    .chat { height: 75vh; overflow-y: auto; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-4xl mx-auto">
    <div class="bg-gradient-to-r from-purple-700 to-pink-600 p-6 text-center text-3xl font-bold">
      🌌 Aether
    </div>
    
    <div id="chat" class="chat p-6 space-y-6 bg-zinc-900"></div>
    
    <div class="p-6 bg-zinc-950 border-t border-zinc-800">
      <div class="flex gap-3">
        <input id="input" 
               type="text" 
               placeholder="Type your command..." 
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-purple-500 text-white">
        <button onclick="sendMessage()" 
                class="bg-purple-600 hover:bg-purple-700 px-10 rounded-2xl font-semibold">
          Send
        </button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    let memory = JSON.parse(localStorage.getItem('aetherMemory') || '[]');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `p-4 rounded-2xl max-w-[80%] ${isUser ? 'ml-auto bg-purple-600 text-white' : 'bg-zinc-800'}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      
      if (!isUser) {
        memory.push({ role: "assistant", content: text });
        localStorage.setItem('aetherMemory', JSON.stringify(memory));
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        let reply = "I'm here. What do you need help with?";

        const lower = text.toLowerCase();

        if (lower.includes("hello") || lower.includes("hi")) reply = "Hello Boss. How can I help you today?";
        else if (lower.includes("who are you")) reply = "I am Aether, your personal AI agent with memory.";
        else if (lower.includes("scrap") || lower.includes("business")) {
          reply = "For your scrap metal business in Bahawalpur, start with Aluminum. It's easiest and most profitable for beginners. Want a full business plan?";
        }

        addMessage(reply, false);
      }, 800);
    }

    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // Load old messages
    memory.forEach(m => addMessage(m.content, m.role === 'user'));
  </script>
</body>
</html>
