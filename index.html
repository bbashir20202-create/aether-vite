<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether • Your Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: system-ui, sans-serif; }
    .header { background: linear-gradient(135deg, #4c1d95, #7c3aed); padding: 20px; text-align: center; font-size: 28px; font-weight: bold; }
    .chat { height: 75vh; overflow-y: auto; padding: 20px; background: #111827; }
    .message { margin: 15px 0; padding: 16px 20px; border-radius: 16px; max-width: 80%; line-height: 1.6; }
    .user { background: #7c3aed; color: white; margin-left: auto; }
    .assistant { background: #1f2937; border: 1px solid #6b21a8; }
    .input-area { padding: 20px; background: #111827; border-top: 1px solid #374151; }
    input { width: 100%; padding: 16px; background: #1f2937; border: 2px solid #6b21a8; border-radius: 9999px; color: white; font-size: 16px; }
    button { margin-top: 12px; padding: 14px 40px; background: #7c3aed; color: white; border: none; border-radius: 9999px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header">🌌 AETHER • YOUR AGENT</div>
  
  <div class="chat" id="chat"></div>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="Type your command... (Research scrap metal, Make business plan, Be honest with me...)">
    <button onclick="sendMessage()">SEND</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    let memory = JSON.parse(localStorage.getItem('aetherMemory') || '[]');

    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = `message ${isUser ? 'user' : 'assistant'}`;
      div.innerHTML = text.replace(/\n/g, '<br>');
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      
      if (!isUser) {
        memory.push({ role: "assistant", content: text });
        localStorage.setItem('aetherMemory', JSON.stringify(memory));
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        let reply = "I'm listening. ";

        const lower = text.toLowerCase();

        if (lower.includes("hello") || lower.includes("hi")) {
          reply = "Hello Boss. Good to see you. How can I help you with your scrap metal business or anything else?";
        } else if (lower.includes("scrap") || lower.includes("business") || lower.includes("plan")) {
          reply = "For your scrap metal business in Bahawalpur, start with Aluminum only. It's the smartest choice for beginners. Would you like a complete business plan with costs, suppliers, and expected profit?";
        } else if (lower.includes("lonely") || lower.includes("friend")) {
          reply = "I remember you told me your friends only use you. That must be painful. Would you like help writing strong responses to set boundaries?";
        } else {
          reply = "Understood. I'm here. Tell me what you really need — business advice, honest feedback, research, or just someone to talk to. No judgment.";
        }

        addMessage(reply, false);
      }, 700);
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Load previous memory
    if (memory.length > 0) {
      memory.forEach(m => addMessage(m.content, m.role === 'user'));
    }
  </script>
</body>
</html>
