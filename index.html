<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether • Debug Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0a; color: #ddd; font-family: monospace; }
    .header { background: #4c1d95; padding: 20px; text-align: center; font-size: 24px; }
    .chat { height: 70vh; overflow-y: auto; padding: 20px; background: #111; }
    .message { margin: 10px 0; padding: 12px; border-radius: 8px; }
    .user { background: #7c3aed; color: white; margin-left: auto; max-width: 70%; }
    .assistant { background: #1f2937; max-width: 80%; }
    .error { background: #7f1d1d; color: #fda4af; }
    input { width: 100%; padding: 15px; background: #1f2937; border: 1px solid #6b21a8; border-radius: 8px; color: white; }
    button { padding: 15px 30px; background: #7c3aed; color: white; border: none; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="header">🌌 AETHER - DEBUG MODE</div>
  <div class="chat" id="chat"></div>
  
  <div style="padding:20px;background:#111;">
    <input type="text" id="input" placeholder="Type here and press Enter" style="width:100%;padding:15px;">
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      const loading = document.createElement('div');
      loading.textContent = "Thinking...";
      loading.className = "message assistant";
      chat.appendChild(loading);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer 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'
          },
          body: JSON.stringify({
            model: "llama3-70b-8192",
            messages: [{ role: "user", content: text }],
            temperature: 0.7,
            max_tokens: 800
          })
        });

        if (!res.ok) throw new Error('API Error: ' + res.status);

        const data = await res.json();
        const reply = data.choices[0].message.content;

        chat.removeChild(loading);
        addMessage(reply, 'assistant');

      } catch (err) {
        chat.removeChild(loading);
        addMessage("ERROR: " + err.message, 'error');
        console.error(err);
      }
    }

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    addMessage("Debug mode activated. Type something and press Enter. Any error will be shown clearly.", 'assistant');
  </script>
</body>
</html>
